<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVAARA - Choose Your Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#F5EFE6',
                            text: '#1C1A17',
                            gold: '#C2A65A',
                            border: '#E6DDC8',
                            featured: '#FCF8F1'
                        }
                    },
                    fontFamily: {
                        playfair: ['"Playfair Display"', 'serif'],
                        inter: ['"Inter"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* Tailwind base overrides for strict text colors */
        body {
            color: #1C1A17;
            background-color: #f8c77e;
            font-family: "Inter", sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: "Playfair Display", serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pt-8 pb-4 px-6 md:pt-16 md:px-12 lg:px-24">

    <header class="mb-12 md:mb-16">
        <div class="text-[0.7rem] uppercase tracking-[0.2em] font-medium text-brand-text mb-8">
            DIVAARA
        </div>
        
        <h1 class="text-3xl md:text-5xl lg:text-6xl font-normal leading-tight mb-6 text-brand-text max-w-2xl">
            Choose Your Styling Experience
        </h1>
        
        <div class="h-px w-[60px] bg-brand-gold"></div>
    </header>

    <main class="flex-grow flex flex-col gap-6 md:gap-8 max-w-[900px]">
        
        <a href="main.html" class="block group relative bg-transparent border border-brand-border rounded-[24px] p-6 md:p-10 transition-all duration-500 ease-out hover:-translate-y-1 hover:border-brand-gold">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="space-y-2">
                    <h2 class="text-xl md:text-2xl font-medium text-brand-text">AI Couture Scan</h2>
                    <p class="text-sm md:text-base font-light text-brand-text/80 tracking-wide">
                        Full automatic body analysis and color analysis.
                    </p>
                </div>
                <div class="flex items-center text-sm md:text-base font-medium tracking-wide text-brand-text group-hover:text-brand-gold transition-colors duration-300">
                    Begin Scan <span class="ml-2 transition-transform duration-300 group-hover:translate-x-1">&rarr;</span>
                </div>
            </div>
        </a>

        <a href="manual-shape.html" class="block group relative bg-transparent border border-brand-border rounded-[24px] p-6 md:p-10 transition-all duration-500 ease-out hover:-translate-y-1 hover:border-brand-gold">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="space-y-2">
                    <h2 class="text-xl md:text-2xl font-medium text-brand-text">Manual Selection</h2>
                    <p class="text-sm md:text-base font-light text-brand-text/80 tracking-wide">
                        Choose your proportions and tone.
                    </p>
                </div>
                <div class="flex items-center text-sm md:text-base font-medium tracking-wide text-brand-text group-hover:text-brand-gold transition-colors duration-300">
                    Select Manually <span class="ml-2 transition-transform duration-300 group-hover:translate-x-1">&rarr;</span>
                </div>
            </div>
        </a>

        
    </main>

    <footer class="mt-16 md:mt-24 pb-4">
        <p class="text-[0.7rem] font-light tracking-wide text-brand-text/50">
            Images are processed securely in real time. Nothing is stored.
        </p>
    </footer>

    <script>
    const selectedGender = localStorage.getItem("divaara.gender");

    if (!selectedGender) {
        window.location.href = "/divaara-frontend/index.html";
    }

    // Change headline subtly
    const mainTitle = document.querySelector("h1");

    if (selectedGender === "male") {
        mainTitle.innerText = "Choose Your Men's Styling Experience";
    } else {
        mainTitle.innerText = "Choose Your Women's Styling Experience";
    }

    // Optional: change subtexts slightly
    const descriptions = document.querySelectorAll("main p");

    if (selectedGender === "male") {
        descriptions[0].innerText = "Full automatic body structure and fit analysis.";
        descriptions[1].innerText = "Select proportions manually for tailored fit logic.";
        descriptions[2].innerText = "AI-driven masculine silhouette refinement.";
    } else {
        descriptions[0].innerText = "Full automatic body and color harmony analysis.";
        descriptions[1].innerText = "Choose your proportions and undertone precisely.";
        descriptions[2].innerText = "AI-driven curve-aware refinement.";
    }
</script>

</body>
</html>
